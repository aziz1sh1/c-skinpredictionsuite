<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>𝓒hemical Scanner AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007BFF">

<!-- PWA Manifest -->
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;:&quot;Chemical Scanner AI&quot;,
  &quot;short_name&quot;:&quot;ChemScanner&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#ffffff&quot;,
  &quot;theme_color&quot;:&quot;#007BFF&quot;,
  &quot;icons&quot;:[
    {
      &quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/2909/2909765.png&quot;,
      &quot;sizes&quot;:&quot;192x192&quot;,
      &quot;type&quot;:&quot;image/png&quot;
    }
  ]
}">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f4f4f4; }
.box { max-width:750px; margin:auto; background:#fff; padding:20px; border-radius:12px; }
input, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; }
button { background:#007BFF; color:white; border:none; font-weight:bold; }
video { width:100%; border-radius:10px; margin-top:10px; }
.result { background:#eef; padding:10px; border-radius:8px; margin-top:10px; }
</style>
</head>

<body>

<div class="box">

<h2>📷 𝓒hemical  data obtian or Scanner AI</h2>

<!-- IMAGE UPLOAD -->
<input type="file" id="imageInput" accept="image/*" onchange="processImage()">
<h3 style="font-size: 10px;">If you have image with chemical name upload this image</h3>

<!-- CAMERA -->
<h3>Camera Scanner</h3>
<h3 style="font-size: 10px;">Use 𝓒amera to scan a label or name of chemical </h3>
<button onclick="startCamera()">📷 Open 𝓒amera</button>
<button onclick="stopCamera()">❌ Close 𝓒amera</button>

<video id="camera" autoplay playsinline muted style="display:none;"></video>
<button id="captureBtn" onclick="captureImage()" style="display:none;">📸 Capture & Scan</button>

<canvas id="snapshot" style="display:none;"></canvas>

<!-- INPUT -->
<h3>𝓒hemical Name Input</h3>
<input type="text" id="chemNameInput" placeholder="Chemical name or CAS">

<button onclick="fetchPubChem()">Fetch PubChem Data</button>

<!-- RESULTS -->
<div id="ocrResult" class="result">OCR Result: none</div>
<div id="pubchemResult" class="result">PubChem Result: none</div>

<h3>Absorption Calculator</h3>
<input type="number" id="logpAbs" placeholder="logP">
<input type="number" id="mwAbs" placeholder="Molecular Weight">

<button onclick="calculateAbsorption()">Calculate</button>

<div id="calcResult" class="result">No calculation yet</div>

</div>

<script>
// ================= OCR =================
async function processImage(){
const file=document.getElementById("imageInput").files[0];
if(file) await runOCR(file);
}

async function runOCR(file){
document.getElementById("ocrResult").innerHTML="Running OCR...";

const res = await Tesseract.recognize(file,'eng');
let text = res.data.text.replace(/\n/g,' ').trim();

document.getElementById("ocrResult").innerHTML =
"OCR: <b>" + text + "</b>";

document.getElementById("chemNameInput").value = text.split(" ")[0];
}

// ================= PUBCHEM =================
async function fetchPubChem(){
const name=document.getElementById("chemNameInput").value;
if(!name) return alert("Enter chemical");

document.getElementById("pubchemResult").innerHTML="Fetching...";

try{
const url=`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${name}/property/MolecularWeight,XLogP/json`;
const res=await fetch(url);
const data=await res.json();

const p=data.PropertyTable.Properties[0];

document.getElementById("mwAbs").value=p.MolecularWeight;
document.getElementById("logpAbs").value=p.XLogP;

document.getElementById("pubchemResult").innerHTML=
`MW: ${p.MolecularWeight}<br>logP: ${p.XLogP}`;

}catch{
document.getElementById("pubchemResult").innerHTML="Not found";
}
}

// ================= CAMERA FIXED =================
let stream=null;

async function startCamera(){
const v=document.getElementById("camera");
const btn=document.getElementById("captureBtn");

try{
stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

v.srcObject=stream;
v.style.display="block";
btn.style.display="block";

await v.play();

}catch(err){
alert("Camera error: " + err.message);
}
}

function stopCamera(){
if(stream){
stream.getTracks().forEach(t=>t.stop());
}
document.getElementById("camera").style.display="none";
document.getElementById("captureBtn").style.display="none";
}

async function captureImage(){
const v=document.getElementById("camera");
const c=document.getElementById("snapshot");
const ctx=c.getContext("2d");

if(v.videoWidth===0){
alert("Camera not ready");
return;
}

c.width=v.videoWidth;
c.height=v.videoHeight;

ctx.drawImage(v,0,0);

c.toBlob(async(blob)=>{
await runOCR(blob);
await fetchPubChem();
},"image/png");
}

// ================= ABSORPTION =================
function calculateAbsorption(){
const logP=parseFloat(document.getElementById("logpAbs").value);
const MW=parseFloat(document.getElementById("mwAbs").value);

if(isNaN(logP)||isNaN(MW)) return alert("Enter values");

const logKp=-2.72+(0.71*logP)-(0.0061*MW);
const Kp=Math.pow(10,logKp);

document.getElementById("calcResult").innerHTML=
`logKp: ${logKp.toFixed(4)}<br>Kp: ${Kp.toExponential(3)}`;
}
</script>

</body>
</html>
