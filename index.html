<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chemical Scanner PWA (Mobile Fixed)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007BFF">

<!-- PWA Manifest Inline -->
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;:&quot;Chemical Scanner AI&quot;,
  &quot;short_name&quot;:&quot;ChemScanner&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#ffffff&quot;,
  &quot;theme_color&quot;:&quot;#007BFF&quot;,
  &quot;icons&quot;:[
    {
      &quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/2909/2909765.png&quot;,
      &quot;sizes&quot;:&quot;192x192&quot;,
      &quot;type&quot;:&quot;image/png&quot;
    },
    {
      &quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/2909/2909765.png&quot;,
      &quot;sizes&quot;:&quot;512x512&quot;,
      &quot;type&quot;:&quot;image/png&quot;
    }
  ]
}">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f4f4;
}

.box {
  max-width: 750px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
}

button {
  background: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0056cc;
}

video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
  border: 2px solid #007BFF;
}

.result {
  background: #eef;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border-left: 5px solid #007BFF;
}

h2 {
  text-align: center;
  color: #007BFF;
}

.scanbox {
  position: relative;
  margin-top: 10px;
}

.scan-overlay {
  position: absolute;
  top: 20%;
  left: 10%;
  width: 80%;
  height: 40%;
  border: 3px dashed rgba(255,255,255,0.9);
  border-radius: 12px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="box">
  <h2>📷 Chemical Scanner AI (PWA - Mobile Fixed)</h2>

  <h3>Upload Image</h3>
  <input type="file" id="imageInput" accept="image/*" onchange="processImage()">

  <h3>Camera Scanner</h3>
  <button onclick="startCamera()">📷 Open Camera</button>
  <button onclick="stopCamera()">❌ Close Camera</button>

  <div class="scanbox">
    <video id="camera" autoplay playsinline muted style="display:none;"></video>
    <div class="scan-overlay" id="overlay" style="display:none;"></div>
  </div>

  <button id="captureBtn" onclick="captureImage()" style="display:none;">📸 Capture & Scan</button>

  <canvas id="snapshot" style="display:none;"></canvas>

  <h3>Chemical Detection</h3>
  <label>Chemical Name / CAS:</label>
  <input type="text" id="chemNameInput" placeholder="Enter chemical name or CAS number">

  <button onclick="fetchPubChem()">Fetch PubChem Data</button>

  <div id="ocrResult" class="result">OCR Result: none</div>
  <div id="pubchemResult" class="result">PubChem Result: none</div>

  <h3>Absorption Calculator (Potts & Guy)</h3>
  <label>logP:</label>
  <input type="number" id="logpAbs" step="0.01">

  <label>Molecular Weight:</label>
  <input type="number" id="mwAbs" step="0.01">

  <button onclick="calculateAbsorption()">Calculate Absorption</button>

  <div id="calcResult" class="result">No calculation yet</div>
</div>

<script>
// ================= SERVICE WORKER (INLINE) =================
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE_NAME = "chem-scanner-cache-v2";
    self.addEventListener("install", e => {
      self.skipWaiting();
    });
    self.addEventListener("fetch", e => {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: "application/javascript" });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL);
}

// ================= CHEMICAL DATABASE =================
const chemDB = [
  "benzene","toluene","ethanol","methanol","acetone","chloroform",
  "formaldehyde","acetic acid","sulfuric acid","nitric acid",
  "phenol","aniline","glucose","urea","ammonia","carbon dioxide",
  "sodium chloride","potassium nitrate"
];

// ================= LEVENSHTEIN =================
function levenshtein(a, b) {
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      matrix[i][j] = (b[i - 1] === a[j - 1])
        ? matrix[i - 1][j - 1]
        : Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
    }
  }
  return matrix[b.length][a.length];
}

// ================= AI CORRECTION =================
function correctChemicalName(input) {
  input = input.toLowerCase();
  let best = input, min = Infinity;

  chemDB.forEach(c => {
    const d = levenshtein(input, c);
    if (d < min) {
      min = d;
      best = c;
    }
  });

  return min <= 3 ? best : input;
}

// ================= CAS DETECTION =================
function extractCAS(text) {
  const m = text.match(/\b\d{2,7}-\d{2}-\d\b/);
  return m ? m[0] : null;
}

// ================= OCR PROCESS IMAGE =================
async function processImage() {
  const file = document.getElementById("imageInput").files[0];
  if (file) await runOCR(file);
}

// ================= IMAGE ENHANCEMENT FOR OCR =================
function enhanceImageForOCR(canvas) {
  const ctx = canvas.getContext("2d");
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    let gray = (r + g + b) / 3;

    // Increase contrast (binary threshold)
    gray = gray > 140 ? 255 : 0;

    data[i] = gray;
    data[i + 1] = gray;
    data[i + 2] = gray;
  }

  ctx.putImageData(imgData, 0, 0);
}

// ================= OCR =================
async function runOCR(file) {
  document.getElementById("ocrResult").innerHTML = "Running OCR... Please wait...";

  try {
    const result = await Tesseract.recognize(file, "eng", {
      logger: m => console.log(m)
    });

    let text = result.data.text;
    let clean = text.replace(/\n/g, " ").replace(/\s+/g, " ").trim();

    let resultHTML = "OCR: <b>" + clean + "</b>";

    const cas = extractCAS(clean);
    if (cas) {
      document.getElementById("chemNameInput").value = cas;
      resultHTML += "<br>🔍 CAS Detected: <b>" + cas + "</b>";
      document.getElementById("ocrResult").innerHTML = resultHTML;
      return;
    }

    let raw = clean.split(" ")[0];
    let corrected = correctChemicalName(raw);

    document.getElementById("chemNameInput").value = corrected;

    if (raw !== corrected) {
      resultHTML += "<br>🧠 Corrected: <b>" + corrected + "</b>";
    }

    document.getElementById("ocrResult").innerHTML = resultHTML;

  } catch (err) {
    document.getElementById("ocrResult").innerHTML = "❌ OCR Failed: " + err.message;
  }
}

// ================= PUBCHEM =================
async function fetchPubChem() {
  const name = document.getElementById("chemNameInput").value.trim();
  if (!name) return alert("Enter chemical name or CAS");

  document.getElementById("pubchemResult").innerHTML = "Fetching PubChem data...";

  try {
    const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/property/MolecularWeight,XLogP/json`;
    const res = await fetch(url);

    if (!res.ok) throw new Error("PubChem Not Found");

    const data = await res.json();
    const p = data.PropertyTable.Properties[0];

    document.getElementById("mwAbs").value = p.MolecularWeight;
    document.getElementById("logpAbs").value = p.XLogP;

    document.getElementById("pubchemResult").innerHTML =
      `✅ <b>${name}</b><br>MW: ${p.MolecularWeight}<br>logP: ${p.XLogP}`;

  } catch (err) {
    document.getElementById("pubchemResult").innerHTML = "❌ Not found in PubChem";
  }
}

// ================= CAMERA (MOBILE FIXED) =================
let stream = null;

async function startCamera() {
  const v = document.getElementById("camera");
  const btn = document.getElementById("captureBtn");
  const overlay = document.getElementById("overlay");

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });

    v.srcObject = stream;
    v.style.display = "block";
    btn.style.display = "block";
    overlay.style.display = "block";

    v.onloadedmetadata = async () => {
      await v.play();
    };

  } catch (err) {
    alert("Camera error: " + err.message);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }

  document.getElementById("camera").style.display = "none";
  document.getElementById("captureBtn").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

// ================= CAPTURE IMAGE =================
async function captureImage() {
  const v = document.getElementById("camera");
  const c = document.getElementById("snapshot");
  const ctx = c.getContext("2d");

  if (!stream || v.videoWidth === 0) {
    alert("Camera not ready yet. Please wait 2 seconds.");
    return;
  }

  c.width = v.videoWidth;
  c.height = v.videoHeight;

  ctx.drawImage(v, 0, 0, c.width, c.height);

  // Enhance image for OCR
  enhanceImageForOCR(c);

  c.toBlob(async (blob) => {
    await runOCR(blob);
    await fetchPubChem();
  }, "image/png");
}

// ================= CALCULATION =================
function calculateAbsorption() {
  const logP = parseFloat(document.getElementById("logpAbs").value);
  const MW = parseFloat(document.getElementById("mwAbs").value);

  if (isNaN(logP) || isNaN(MW)) return alert("Enter logP and MW values");

  const logKp = -2.72 + (0.71 * logP) - (0.0061 * MW);
  const Kp = Math.pow(10, logKp);

  document.getElementById("calcResult").innerHTML =
    `<b>Absorption Result</b><br>logKp: ${logKp.toFixed(4)}<br>Kp: ${Kp.toExponential(3)} cm/s`;
}
</script>

</body>
</html>
